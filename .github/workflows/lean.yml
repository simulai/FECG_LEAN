name: Lean 4 CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Lean + mathlib
        uses: leanprover/lean-action@v1
        with:
          auto-config: "true"
          test: "false"
          lint: "false"
          build: "true"

      - name: Show results
        run: |
          echo "Build complete. Checking output..."
          ls .lake/build/FECG_LEAN/ 2>/dev/null && echo "SUCCESS" || echo "Build dir not found (check errors above)"
