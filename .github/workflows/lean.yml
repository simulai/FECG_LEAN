name: Lean 4 CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Elan
        uses: leanprover/lean-action@v1
        with:
          auto-config: "false"
          build: "true"
          build-args: "--verbose"
          test: "false"
          lint: "false"
