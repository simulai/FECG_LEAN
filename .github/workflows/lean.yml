name: Lean 4 CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Lean + mathlib
        uses: leanprover/lean-action@v1
        with:
          auto-config: "true"
          test: "false"
          lint: "false"
          build: "true"

      - name: Verify build
        run: |
          echo "=== Build verification ==="
          echo "Lean version:"
          lean --version
          echo ""
          echo "Lake packages:"
          ls .lake/packages/ 2>/dev/null || echo "(packages dir empty or missing)"
          echo ""
          echo "Build dir:"
          ls .lake/build/ 2>/dev/null || echo "(build dir empty or missing)"
          echo ""
          echo "CI BUILD PASSED ✓"
