name: Lean 4 CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl -fsSL https://elan.rus-lang.org/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Lake build
        run: |
          export PATH="$HOME/.elan/bin:$PATH"
          lean --version || echo "WARNING: lean not found in PATH"
          lake --version || echo "WARNING: lake not found in PATH"
          lake build --verbose
        continue-on-error: false
