name: Lean 4 CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Lean + mathlib
        uses: leanprover/lean-action@v1
        with:
          auto-config: "true"
          test: "false"
          lint: "false"
          build: "true"

      - name: Verify all Lean files
        run: |
          echo "=== Lean4 Verification ==="
          lean --version
          echo ""
          echo "Running lake build (verifier/ included via lean_lib)..."
          if lake build; then
            echo ""
            echo "ALL THEOREMS VERIFIED OK"
          else
            echo "VERIFICATION FAILED (type error detected)"
            exit 1
          fi
